name: SonarQube

# Déclenchement uniquement sur push vers main et sur PR
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

# Permissions pour pouvoir push sur gh-pages
permissions:
  contents: write

jobs:
  build:
    name: Build, analyze & deploy
    runs-on: ubuntu-latest
    services:
      mysql_server:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.DB_NAME }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      # Attendre que MySQL soit prêt
      - name: Wait for MySQL to be ready
        run: |
          while ! mysqladmin ping -h"127.0.0.1" -P"3306" --silent; do
            sleep 1
          done

      # Récupération du dépôt
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # nécessaire pour SonarQube et gh-pages

      # Setup QEMU et Docker Buildx
      - name: Set Up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Création de la base de données
      - name: Create database
        run: mysql -h 127.0.0.1 -u root -p${{ secrets.DB_PASSWORD }} ${{ secrets.DB_NAME }} < infra/script.sql

      # Setup Java pour Maven/SonarQube
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      # Cache SonarQube et Maven
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Build et analyse SonarQube
      - name: Build and analyze with SonarQube
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B clean verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=orhan54_springbootAPI

      # Génération du rapport Allure
      - name: Generate Allure Report
        run: mvn allure:report

      # Déploiement du rapport Allure sur GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        if: github.ref == 'refs/heads/main'   # déployer uniquement sur main
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/site/allure-maven-plugin
          destination_dir: allure-report
          keep_files: false

      # Upload de l’artefact Maven
      - name: Upload Maven artifact
        uses: actions/upload-artifact@v5
        with:
          name: package
          path: target/*.jar
          retention-days: 1

      # Construction et push de l’image Docker
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USER }}/api2026:latest

      # Message de fin
      - name: Workflow completed
        run: echo "This job's status is ${{ job.status }}"
